version: '3.8'

networks:
  transcendence:
    name: transcendence
    driver: bridge

# Database - PostgreSQL
services:
  postgres-db:
    container_name: database
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS="--data-checksums"
    build:
      context: ./database
      dockerfile: Dockerfile
    image: database
    networks:
      - transcendence
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Frontend - Django
  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: frontend
    networks:
      - transcendence
    ports:
      - 8000:8000
    env_file:
      - .env
    depends_on:
      - postgres-db
    volumes:
      - ./frontend:/app

  # Authentication service - Django
  user_management_service:
    container_name: user_management_service
    build:
      args:
        DJANGO_ROOT_PASSWORD: ${DJANGO_ROOT_PASSWORD}
      context: ./user_management_service/
      dockerfile: Dockerfile
    image: user_management_service
    networks:
      - transcendence
    ports:
      - 8001:8000
    environment:
      - DB_ENGINE=django.db.backends.postgresql
      - POSTGRES_DB=postgres
      - POSTGRES_USER=db_user
      - POSTGRES_PASSWORD=db_password321
      - POSTGRES_HOST=postgres-db
      - POSTGRES_PORT=5432
    env_file:
      - .env
    depends_on:
      - postgres-db
      - frontend
    volumes:
      - ./user_management_service:/app
    stop_grace_period: 2s

  # Nginx - Proxy Reverse (With WAF configuration)
  nginx:
    container_name: nginx
    build:
      context: ./nginx
      dockerfile: Dockerfile
    image: nginx
    networks:
      - transcendence
    ports:
      - 7000:80
    depends_on:
      - frontend
      - user_management_service
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf


volumes:
  postgres_data:
